<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Type Race</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text-dim: #3a3a3a;
            --text-sub: #888;
            --text-main: #d4d4d4;
            --correct: #d4d4d4;
            --wrong: #ca4754;
            --cursor: #e2b714;
            --accent: #e2b714;
            --caret-bg: rgba(226, 183, 20, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow: hidden;
        }

        #header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        #header svg { width: 22px; height: 22px; fill: var(--accent); }
        #header span {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* === STATS BAR === */
        #stats-bar {
            display: flex;
            gap: 32px;
            margin-bottom: 28px;
            width: 100%;
            max-width: 720px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-value {
            font-family: 'Roboto Mono', monospace;
            font-size: 2rem;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
            transition: color 0.2s;
        }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        /* === WORD DISPLAY === */
        #words-container {
            width: 100%;
            max-width: 720px;
            position: relative;
            margin-bottom: 24px;
        }

        #words {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            line-height: 2.2;
            color: var(--text-dim);
            word-spacing: 6px;
            letter-spacing: 0.05em;
            height: 3em; /* Show exactly 1 row visually */
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        #words-inner {
            position: absolute;
            top: 0;
            left: 0;
            white-space: nowrap;
            transition: transform 0.15s ease;
        }

        .word {
            display: inline-block;
            margin-right: 0.6em;
            position: relative;
        }

        .letter {
            position: relative;
            display: inline-block;
        }

        .letter.correct { color: var(--correct); }
        .letter.wrong { color: var(--wrong); text-decoration: underline; text-decoration-color: var(--wrong); }
        .letter.extra { color: var(--wrong); opacity: 0.7; }

        /* Caret */
        .letter.caret::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 2px;
            bottom: 2px;
            width: 2px;
            background: var(--accent);
            border-radius: 2px;
            animation: blink 1s step-end infinite;
        }

        .letter.caret-after::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 2px;
            bottom: 2px;
            width: 2px;
            background: var(--accent);
            border-radius: 2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* === INPUT === */
        #input-area {
            width: 100%;
            max-width: 720px;
            position: relative;
        }

        #input {
            width: 100%;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            caret-color: var(--accent);
        }

        #input:focus {
            border-color: var(--accent);
        }

        #input.wrong-word {
            border-color: var(--wrong);
        }

        /* === SCREENS === */
        .screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* === START SCREEN === */
        #start-screen h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        #start-screen p {
            color: var(--text-sub);
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 10px 22px;
            color: var(--text-sub);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover, .mode-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--caret-bg);
        }

        .start-btn {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 14px 48px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .start-btn:hover { filter: brightness(1.1); transform: scale(1.03); }
        .start-btn:active { transform: scale(0.97); }

        /* === RESULTS SCREEN === */
        #result-screen h2 {
            font-size: 1rem;
            color: var(--text-sub);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 40px;
            margin-bottom: 40px;
        }

        .result-stat {
            text-align: center;
        }

        .result-stat .big {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(2.8rem, 10vw, 4.5rem);
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
        }

        .result-stat .label {
            margin-top: 6px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        #rank-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 28px;
            min-width: 260px;
        }

        #rank-badge span { color: var(--accent); font-weight: 700; }

        #sync-status {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 24px;
            min-height: 20px;
        }

        .retry-btn {
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 12px 36px;
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .retry-btn:hover { background: var(--caret-bg); }

        /* Countdown ring  */
        #timer-ring {
            position: fixed;
            top: 18px;
            right: 18px;
        }

        #timer-ring svg { width: 54px; height: 54px; }
        #timer-ring circle { stroke-dasharray: 138; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        #timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent);
        }

        /* Progress bar */
        #progress-bar {
            width: 100%;
            max-width: 720px;
            height: 3px;
            background: var(--border);
            border-radius: 99px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            width: 0%;
            transition: width 0.15s ease;
        }
    </style>
</head>
<body>

<!-- ========== START SCREEN ========== -->
<div id="start-screen" class="screen">
    <div id="header" style="margin-bottom:24px;">
        <svg viewBox="0 0 24 24"><path d="M3 17h2v-7H3v7zm4 0h2V7H7v10zm4 0h2v-4h-2v4zm4 0h2V3h-2v14zm4 0h2v-10h-2v10zM2 19h20v2H2z"/></svg>
        <span>Type Race</span>
    </div>
    <h1>typerace</h1>
    <p>Test your speed against the group</p>

    <div style="margin-bottom: 32px; display: flex; align-items: center; gap: 10px; color: var(--text-sub); font-family: 'Roboto Mono', monospace;">
        <span style="font-size: 2.5rem; color: var(--accent); font-weight: 500;">45</span>
        <span style="font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;">seconds</span>
    </div>

    <button class="start-btn" id="start-btn">Start Typing</button>
</div>

<!-- ========== GAME UI ========== -->
<div id="game-screen" class="screen hidden">
    <div id="stats-bar">
        <div class="stat">
            <div class="stat-value" id="wpm-display">0</div>
            <div class="stat-label">WPM</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="acc-display">100</div>
            <div class="stat-label">ACC %</div>
        </div>
    </div>

    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div id="words-container">
        <div id="words"><div id="words-inner"></div></div>
    </div>

    <div id="input-area">
        <input
            id="input"
            type="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="start typing…"
        >
    </div>

    <!-- Timer Ring -->
    <div id="timer-ring">
        <svg viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="22" fill="none" stroke="#2a2a2a" stroke-width="3"/>
            <circle id="timer-circle" cx="24" cy="24" r="22" fill="none" stroke="#e2b714"
                stroke-width="3" stroke-linecap="round"
                transform="rotate(-90 24 24)"
                stroke-dasharray="138" stroke-dashoffset="0"/>
        </svg>
        <div id="timer-text">--</div>
    </div>
</div>

<!-- ========== RESULTS SCREEN ========== -->
<div id="result-screen" class="screen hidden">
    <h2>Results</h2>
    <div class="result-grid">
        <div class="result-stat">
            <div class="big" id="result-wpm">0</div>
            <div class="label">WPM</div>
        </div>
        <div class="result-stat">
            <div class="big" id="result-acc">0</div>
            <div class="label">Accuracy</div>
        </div>
        <div class="result-stat">
            <div class="big" id="result-words">0</div>
            <div class="label">Words</div>
        </div>
        <div class="result-stat">
            <div class="big" id="result-chars">0</div>
            <div class="label">Chars</div>
        </div>
    </div>

    <div id="rank-badge">⏳ Syncing score...</div>
    <div id="sync-status"></div>
    <button class="retry-btn" id="retry-btn">Play Again</button>
</div>

<script>
// ======================== TELEGRAM PARAMS ========================
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user_id');
const inlineMessageId = urlParams.get('inline_message_id');
const chatId = urlParams.get('chat_id');
const messageId = urlParams.get('message_id');

// ======================== WORD POOL ========================
const WORD_POOL = [
    "the", "be", "of", "and", "a", "in", "to", "have", "it", "for",
    "not", "on", "with", "he", "as", "you", "do", "at", "this", "but",
    "his", "by", "from", "they", "we", "say", "her", "she", "or", "an",
    "will", "my", "one", "all", "would", "there", "their", "what", "so",
    "up", "out", "if", "about", "who", "get", "which", "go", "me", "when",
    "make", "can", "like", "time", "no", "just", "him", "know", "take",
    "people", "into", "year", "your", "good", "some", "could", "them",
    "see", "other", "than", "then", "now", "look", "only", "come", "its",
    "over", "think", "also", "back", "after", "use", "two", "how", "our",
    "work", "first", "well", "way", "even", "new", "want", "because",
    "any", "these", "give", "day", "most", "great", "between", "need",
    "large", "often", "hand", "high", "place", "hold", "turn", "move",
    "play", "small", "number", "off", "always", "next", "food", "keep",
    "children", "feet", "land", "side", "without", "once", "paper", "hard",
    "near", "sentence", "better", "open", "example", "story", "light",
    "voice", "power", "town", "fine", "drive", "short", "road", "book",
    "stop", "city", "tree", "cross", "farm", "hard", "start", "might",
    "walk", "river", "four", "carry", "state", "once", "book", "hear",
    "stop", "call", "eyes", "letter", "until", "real", "life", "few",
    "north", "open", "seem", "together", "next", "white", "children", "begin",
    "got", "walk", "example", "ease", "paper", "group", "always"
];

function generateWords(count = 80) {
    const out = [];
    for (let i = 0; i < count; i++) {
        out.push(WORD_POOL[Math.floor(Math.random() * WORD_POOL.length)]);
    }
    return out;
}

// ======================== STATE ========================
const MODE_TIME = 45; // Fixed for fair leaderboard comparison
let words = [];
let letterEls = []; // [{el, char}] per word
let wordEls = [];

let curWordIdx = 0;
let curLetterIdx = 0;
let typed = ''; // current word typed

let correctWords = 0;
let totalChars = 0;
let correctChars = 0;
let totalKeystrokes = 0;
let correctKeystrokes = 0;

let timerInterval = null;
let timeLeft = 0;
let gameRunning = false;
let gameStarted = false;

// ======================== DOM ========================
const startScreen   = document.getElementById('start-screen');
const gameScreen    = document.getElementById('game-screen');
const resultScreen  = document.getElementById('result-screen');
const wordsInner    = document.getElementById('words-inner');
const inputEl       = document.getElementById('input');
const wpmDisplay    = document.getElementById('wpm-display');
const accDisplay    = document.getElementById('acc-display');
const progressFill  = document.getElementById('progress-fill');
const timerText     = document.getElementById('timer-text');
const timerCircle   = document.getElementById('timer-circle');

function showScreen(id) {
    [startScreen, gameScreen, resultScreen].forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

// ======================== BUILD WORD UI ========================
function buildWordUI() {
    wordsInner.innerHTML = '';
    wordEls = [];
    letterEls = [];

    words.forEach((word, wi) => {
        const wEl = document.createElement('span');
        wEl.className = 'word';
        const letters = [];
        word.split('').forEach((ch, li) => {
            const lEl = document.createElement('span');
            lEl.className = 'letter';
            lEl.textContent = ch;
            // Mark first letter of first word as caret position
            if (wi === 0 && li === 0) lEl.classList.add('caret');
            wEl.appendChild(lEl);
            letters.push({ el: lEl, char: ch });
        });
        wordsInner.appendChild(wEl);
        wordEls.push(wEl);
        letterEls.push(letters);
    });
}

function scrollToCurrentWord() {
    // Slide the stripe so the active word stays visible
    if (!wordEls[curWordIdx]) return;
    const wEl = wordEls[curWordIdx];
    const left = wEl.offsetLeft;
    const containerW = wordsInner.parentElement.offsetWidth;
    // Keep the current word roughly centered
    let translateX = -left + containerW * 0.2;
    if (translateX > 0) translateX = 0;
    wordsInner.style.transform = `translateX(${translateX}px)`;
}

// ======================== CARET ========================
function updateCaret() {
    // Remove all caret classes
    document.querySelectorAll('.caret, .caret-after').forEach(el => {
        el.classList.remove('caret', 'caret-after');
    });

    const letters = letterEls[curWordIdx];
    if (!letters) return;

    if (curLetterIdx < letters.length) {
        letters[curLetterIdx].el.classList.add('caret');
    } else if (letters.length > 0) {
        // Caret is after last letter
        letters[letters.length - 1].el.classList.add('caret-after');
    }
}

// ======================== TIMER ========================
function startTimer() {
    timeLeft = MODE_TIME;
    timerText.textContent = timeLeft;
    const circumference = 138;
    timerCircle.style.strokeDashoffset = 0;

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        timerText.textContent = timeLeft;

        // Shrink the ring
        const offset = circumference * (1 - timeLeft / MODE_TIME);
        timerCircle.style.strokeDashoffset = offset;

        // Update live WPM
        const elapsed = MODE_TIME - timeLeft;
        if (elapsed > 0) {
            const liveWpm = Math.round((correctWords / elapsed) * 60);
            wpmDisplay.textContent = liveWpm;
        }

        if (timeLeft <= 0) {
            endGame();
        }

        // Update accuracy live
        if (totalKeystrokes > 0) {
            accDisplay.textContent = Math.round((correctKeystrokes / totalKeystrokes) * 100);
        }
    }, 1000);
}

// ======================== INPUT HANDLING ========================
inputEl.addEventListener('input', () => {
    if (!gameRunning) return;

    const val = inputEl.value;
    const lastChar = val[val.length - 1];

    // Start timer on first keystroke
    if (!gameStarted && val.length > 0) {
        gameStarted = true;
        startTimer();
    }

    // Space = submit word
    if (lastChar === ' ') {
        commitWord();
        return;
    }

    typed = val;
    totalKeystrokes++;

    const letters = letterEls[curWordIdx];
    const word = words[curWordIdx];

    // Reset all letters to dim
    letterEls[curWordIdx].forEach(l => l.el.className = 'letter');

    // Apply correct/wrong
    for (let i = 0; i < val.length; i++) {
        if (i < letters.length) {
            letters[i].el.className = 'letter ' + (val[i] === letters[i].char ? 'correct' : 'wrong');
            if (val[i] === letters[i].char) correctKeystrokes++;
        }
        // extra chars beyond the word length shown differently
    }

    // Wrong word border
    let isWrong = false;
    for (let i = 0; i < val.length && i < word.length; i++) {
        if (val[i] !== word[i]) { isWrong = true; break; }
    }
    inputEl.classList.toggle('wrong-word', isWrong);

    curLetterIdx = val.length;
    updateCaret();
});

inputEl.addEventListener('keydown', (e) => {
    // Prevent backspace from deleting past the start of a word? No - allow full edits
    if (e.key === 'Backspace' && inputEl.value === '') {
        // Optionally go back to previous word
        if (curWordIdx > 0) {
            curWordIdx--;
            typed = words[curWordIdx]; // restore typed word? Let's just reset
            inputEl.value = '';
            // Restore previous word letters to unfinished state
            letterEls[curWordIdx].forEach(l => l.el.className = 'letter');
            curLetterIdx = 0;
            updateCaret();
            scrollToCurrentWord();
        }
        e.preventDefault();
    }
});

function commitWord() {
    inputEl.value = '';
    inputEl.classList.remove('wrong-word');

    const word = words[curWordIdx];
    const userTyped = typed.trim();

    if (userTyped === word) {
        correctWords++;
        correctChars += word.length;
    }
    totalChars += word.length;

    // Mark word as done visually
    letterEls[curWordIdx].forEach((l, i) => {
        if (i < userTyped.length) {
            l.el.className = 'letter ' + (userTyped[i] === l.char ? 'correct' : 'wrong');
        }
    });

    curWordIdx++;
    typed = '';
    curLetterIdx = 0;

    // Progress
    progressFill.style.width = ((curWordIdx / words.length) * 100) + '%';

    if (curWordIdx >= words.length) {
        endGame();
        return;
    }

    updateCaret();
    scrollToCurrentWord();
}

// ======================== END GAME ========================
function endGame() {
    clearInterval(timerInterval);
    gameRunning = false;
    inputEl.blur();

    const elapsed = Math.max(1, MODE_TIME - timeLeft);
    const finalWpm = Math.round((correctWords / elapsed) * 60);
    const finalAcc = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;

    document.getElementById('result-wpm').textContent = finalWpm;
    document.getElementById('result-acc').textContent = finalAcc + '%';
    document.getElementById('result-words').textContent = correctWords;
    document.getElementById('result-chars').textContent = correctChars;

    showScreen('result-screen');
    submitScore(finalWpm, finalAcc, correctWords);
}

// ======================== SCORE SUBMISSION ========================
async function submitScore(wpm, acc, wordsTyped) {
    const rankBadge    = document.getElementById('rank-badge');
    const syncStatus   = document.getElementById('sync-status');

    if (!userId || wpm <= 0) {
        rankBadge.innerHTML = 'Local session – no Telegram user';
        return;
    }

    try {
        const response = await fetch('/api/set_score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: userId,
                score: wpm,
                inline_message_id: inlineMessageId,
                chat_id: chatId,
                message_id: messageId
            })
        });

        const data = await response.json();
        if (response.ok) {
            if (data.rank && data.rank > 0) {
                rankBadge.innerHTML = `🏆 Rank <span>#${data.rank}</span> in the group`;
            } else {
                rankBadge.innerHTML = `<span>${wpm} WPM</span> submitted!`;
            }
            syncStatus.textContent = '';
        } else if (data.description && data.description.includes('smaller')) {
            rankBadge.innerHTML = `<span>${wpm} WPM</span> — not your best`;
            syncStatus.textContent = 'Your high score is still on the board.';
        } else {
            rankBadge.innerHTML = 'Sync failed';
            syncStatus.textContent = data.description || 'Unknown error';
        }
    } catch (err) {
        rankBadge.innerHTML = 'Network error';
        syncStatus.textContent = String(err);
    }
}

// ======================== INIT / RESTART ========================
function initGame() {
    curWordIdx = 0;
    curLetterIdx = 0;
    typed = '';
    correctWords = 0;
    totalChars = 0;
    correctChars = 0;
    totalKeystrokes = 0;
    correctKeystrokes = 0;
    gameRunning = true;
    gameStarted = false;
    timerText.textContent = MODE_TIME;
    timerCircle.style.strokeDashoffset = 0;
    wpmDisplay.textContent = 0;
    accDisplay.textContent = 100;
    progressFill.style.width = '0%';
    inputEl.value = '';
    inputEl.classList.remove('wrong-word');

    words = generateWords(80);
    wordsInner.style.transform = 'translateX(0)';
    buildWordUI();

    showScreen('game-screen');
    setTimeout(() => inputEl.focus(), 50);
}

document.getElementById('start-btn').addEventListener('click', initGame);
document.getElementById('retry-btn').addEventListener('click', () => showScreen('start-screen'));

// Auto-focus input when clicking anywhere on game screen  
document.getElementById('game-screen').addEventListener('click', () => {
    if (gameRunning) inputEl.focus();
});
</script>
</body>
</html>
