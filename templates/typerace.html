<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Type Race</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text-dim: #3a3a3a;
            --text-sub: #888;
            --text-main: #d4d4d4;
            --correct: #d4d4d4;
            --wrong: #ca4754;
            --cursor: #e2b714;
            --accent: #e2b714;
            --caret-bg: rgba(226, 183, 20, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow: hidden;
        }

        #header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        #header svg { width: 22px; height: 22px; fill: var(--accent); }
        #header span {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* === STATS BAR === */
        #stats-bar {
            display: flex;
            gap: 32px;
            margin-bottom: 28px;
            width: 100%;
            max-width: 720px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-value {
            font-family: 'Roboto Mono', monospace;
            font-size: 2rem;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
            transition: color 0.2s;
        }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        /* === WORD DISPLAY === */
        #words-container {
            width: 100%;
            max-width: 720px;
            position: relative;
            margin-bottom: 24px;
        }

        #words {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            line-height: 2.2;
            color: var(--text-dim);
            word-spacing: 6px;
            letter-spacing: 0.05em;
            height: 3em; /* Show exactly 1 row visually */
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        #words-inner {
            position: absolute;
            top: 0;
            left: 0;
            white-space: nowrap;
            transition: transform 0.15s ease;
        }

        .word {
            display: inline-block;
            margin-right: 0.6em;
            position: relative;
        }

        .letter {
            position: relative;
            display: inline-block;
        }

        .letter.correct { color: var(--correct); }
        .letter.wrong { color: var(--wrong); text-decoration: underline; text-decoration-color: var(--wrong); }
        .letter.extra { color: var(--wrong); opacity: 0.7; }

        /* Caret */
        .letter.caret::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 2px;
            bottom: 2px;
            width: 2px;
            background: var(--accent);
            border-radius: 2px;
            animation: blink 1s step-end infinite;
        }

        .letter.caret-after::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 2px;
            bottom: 2px;
            width: 2px;
            background: var(--accent);
            border-radius: 2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* === INPUT === */
        #input-area {
            width: 100%;
            max-width: 720px;
            position: relative;
        }

        #input {
            width: 100%;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            caret-color: var(--accent);
        }

        #input:focus {
            border-color: var(--accent);
        }

        #input.wrong-word {
            border-color: var(--wrong);
        }

        /* === SCREENS === */
        .screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
            transition: opacity 0.3s;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* === START SCREEN === */
        #start-screen h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        #start-screen p {
            color: var(--text-sub);
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background: transparent;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 10px 22px;
            color: var(--text-sub);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover, .mode-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--caret-bg);
        }

        .start-btn {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 14px 48px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .start-btn:hover { filter: brightness(1.1); transform: scale(1.03); }
        .start-btn:active { transform: scale(0.97); }

        /* === RESULTS SCREEN === */
        #result-screen h2 {
            font-size: 1rem;
            color: var(--text-sub);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .result-card {
            width: 100%;
            max-width: 540px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
            margin-bottom: 24px;
        }

        .stat-item {
            background: var(--surface);
            padding: 24px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-item:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-item .stat-value {
            font-size: 2.8rem;
            font-family: 'Roboto Mono', monospace;
            color: var(--accent);
            line-height: 1;
        }

        .stat-item .stat-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-sub);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #rank-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            width: 100%;
            display: none; /* Hidden until sync completes */
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease-out;
        }

        .rank-label {
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .rank-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .rank-value span {
            color: var(--accent);
        }

        #rank-badge span { color: var(--accent); font-weight: 700; }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .syncing-pulse {
            animation: pulse 1.5s ease-in-out infinite;
            color: var(--text-sub);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        #sync-status {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 24px;
            min-height: 20px;
        }

        .action-btns {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin-top: 8px;
        }

        .action-btn {
            flex: 1;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .action-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .action-btn:active { transform: translateY(0); }

        .action-btn.secondary {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .action-btn.secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Countdown ring  */
        #timer-ring {
            position: fixed;
            top: 18px;
            right: 18px;
        }

        #timer-ring svg { width: 54px; height: 54px; }
        #timer-ring circle { stroke-dasharray: 138; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        #timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent);
        }

        /* Progress bar */
        #progress-bar {
            width: 100%;
            max-width: 720px;
            height: 3px;
            background: var(--border);
            border-radius: 99px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            width: 0%;
            transition: width 0.15s ease;
        }
        /* ===== SYNC OVERLAY ===== */
        .sync-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
        }
        .sync-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }
        .sync-content {
            text-align: center;
            color: white;
            animation: syncPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes syncPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .sync-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        .sync-text {
            display: none;
        }
        .sync-status {
            margin-top: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .sync-btn {
            margin-top: 24px;
            padding: 10px 24px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- ========== START SCREEN ========== -->
<div id="start-screen" class="screen">
    <div id="header" style="margin-bottom:24px;">
        <svg viewBox="0 0 24 24"><path d="M3 17h2v-7H3v7zm4 0h2V7H7v10zm4 0h2v-4h-2v4zm4 0h2V3h-2v14zm4 0h2v-10h-2v10zM2 19h20v2H2z"/></svg>
        <span>Type Race</span>
    </div>
    <h1>typerace</h1>
    <p>Test your speed against the group</p>

    <div style="margin-bottom: 32px; display: flex; align-items: center; gap: 10px; color: var(--text-sub); font-family: 'Roboto Mono', monospace;">
        <span style="font-size: 2.5rem; color: var(--accent); font-weight: 500;">45</span>
        <span style="font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;">seconds</span>
    </div>

    <button class="start-btn" id="start-btn">Start Typing</button>
</div>

<!-- ========== GAME UI ========== -->
<div id="game-screen" class="screen hidden">
    <div id="stats-bar">
        <div class="stat">
            <div class="stat-value" id="wpm-display">0</div>
            <div class="stat-label">WPM</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="acc-display">100</div>
            <div class="stat-label">ACC %</div>
        </div>
    </div>

    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div id="words-container">
        <div id="words"><div id="words-inner"></div></div>
    </div>

    <div id="input-area">
        <input
            id="input"
            type="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="start typing…"
        >
    </div>

    <!-- Timer Ring -->
    <div id="timer-ring">
        <svg viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="22" fill="none" stroke="#2a2a2a" stroke-width="3"/>
            <circle id="timer-circle" cx="24" cy="24" r="22" fill="none" stroke="#e2b714"
                stroke-width="3" stroke-linecap="round"
                transform="rotate(-90 24 24)"
                stroke-dasharray="138" stroke-dashoffset="0"/>
        </svg>
        <div id="timer-text">--</div>
    </div>
</div>

<!-- ========== RESULTS SCREEN ========== -->
<div id="result-screen" class="screen hidden">
    <div class="result-card">
        <div id="header" style="margin-bottom:32px; opacity: 1;">
            <svg viewBox="0 0 24 24"><path d="M3 17h2v-7H3v7zm4 0h2V7H7v10zm4 0h2v-4h-2v4zm4 0h2V3h-2v14zm4 0h2v-10h-2v10zM2 19h20v2H2z"/></svg>
            <span>Race Results</span>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="result-wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="result-acc">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="result-words">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="result-chars">0</div>
                <div class="stat-label">Chars</div>
            </div>
        </div>
        
        <div id="rank-badge"></div>
        <div id="sync-status"></div>

        <div class="action-btns">
            <button class="action-btn" id="retry-btn">Try Again</button>
            <button class="action-btn secondary" onclick="location.reload()">New Topic</button>
        </div>
    </div>
</div>

<!-- SYNC OVERLAY -->
<div id="sync-overlay" class="sync-overlay">
    <div class="sync-content">
        <div id="sync-spinner" class="sync-spinner"></div>
        <div id="sync-status-msg" class="sync-status"></div>
        <button id="sync-continue-btn" class="sync-btn" onclick="hideSyncOverlay()">Continue</button>
    </div>
</div>

<script>
// ======================== TELEGRAM PARAMS ========================
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('user_id');
const inlineMessageId = urlParams.get('inline_message_id');
const chatId = urlParams.get('chat_id');
const messageId = urlParams.get('message_id');

const BOOK_EXCERPTS = [
    {
        text: "It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife.",
        source: "Pride and Prejudice, Jane Austen"
    },
    {
        text: "Call me Ishmael. Some years ago—never mind how long precisely—having little or no money in my purse, and nothing particular to interest me on shore, I thought I would sail about a little and see the watery part of the world.",
        source: "Moby Dick, Herman Melville"
    },
    {
        text: "It was the best of times, it was the worst of times, it was the age of wisdom, it was the age of foolishness, it was the epoch of belief, it was the epoch of incredulity, it was the season of Light, it was the season of Darkness, it was the spring of hope, it was the winter of despair.",
        source: "A Tale of Two Cities, Charles Dickens"
    },
    {
        text: "In my younger and more vulnerable years my father gave me some advice that I've been turning over in my mind ever since. Whenever you feel like criticizing any one, he told me, just remember that all the people in this world haven't had the advantages that you've had.",
        source: "The Great Gatsby, F. Scott Fitzgerald"
    },
    {
        text: "Alice was beginning to get very tired of sitting by her sister on the bank, and of having nothing to do: once or twice she had peeped into the book her sister was reading, but it had no pictures or conversations in it, 'and what is the use of a book,' thought Alice 'without pictures or conversations?'",
        source: "Alice's Adventures in Wonderland, Lewis Carroll"
    },
    {
        text: "The Sherlock Holmes she had known was a man of iron, or at least of steel, but here was a man of flesh and blood, with a heart that could be reached and a spirit that could be moved.",
        source: "The Adventures of Sherlock Holmes, Arthur Conan Doyle"
    },
    {
        text: "All children, except one, grow up. They soon know that they will grow up, and the way Wendy knew was this. One day when she was two years old she was playing in a garden, and she plucked another flower and ran with it to her mother. I suppose she must have looked rather delightful, for Mrs. Darling put her hand to her heart and cried, 'Oh, why can't you remain like this for ever!'",
        source: "Peter Pan, J.M. Barrie"
    }
];

function getRandomParagraph() {
    const excerpt = BOOK_EXCERPTS[Math.floor(Math.random() * BOOK_EXCERPTS.length)];
    return excerpt.text.split(' ');
}

// ======================== STATE ========================
const MODE_TIME = 45; // Fixed for fair leaderboard comparison
let words = [];
let letterEls = []; // [{el, char}] per word
let wordEls = [];

let curWordIdx = 0;
let curLetterIdx = 0;
let typed = ''; // current word typed

let correctWords = 0;
let totalChars = 0;
let correctChars = 0;
let totalKeystrokes = 0;
let correctKeystrokes = 0;

let timerInterval = null;
let timeLeft = 0;
let gameRunning = false;
let gameStarted = false;

// ======================== DOM ========================
const startScreen   = document.getElementById('start-screen');
const gameScreen    = document.getElementById('game-screen');
const resultScreen  = document.getElementById('result-screen');
const wordsInner    = document.getElementById('words-inner');
const inputEl       = document.getElementById('input');
const wpmDisplay    = document.getElementById('wpm-display');
const accDisplay    = document.getElementById('acc-display');
const progressFill  = document.getElementById('progress-fill');
const timerText     = document.getElementById('timer-text');
const timerCircle   = document.getElementById('timer-circle');

function showScreen(id) {
    [startScreen, gameScreen, resultScreen].forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

// ======================== BUILD WORD UI ========================
function buildWordUI() {
    wordsInner.innerHTML = '';
    wordEls = [];
    letterEls = [];

    words.forEach((word, wi) => {
        const wEl = document.createElement('span');
        wEl.className = 'word';
        const letters = [];
        word.split('').forEach((ch, li) => {
            const lEl = document.createElement('span');
            lEl.className = 'letter';
            lEl.textContent = ch;
            // Mark first letter of first word as caret position
            if (wi === 0 && li === 0) lEl.classList.add('caret');
            wEl.appendChild(lEl);
            letters.push({ el: lEl, char: ch });
        });
        wordsInner.appendChild(wEl);
        wordEls.push(wEl);
        letterEls.push(letters);
    });
}

function scrollToCurrentWord() {
    // Slide the stripe so the active word stays visible
    if (!wordEls[curWordIdx]) return;
    const wEl = wordEls[curWordIdx];
    const left = wEl.offsetLeft;
    const containerW = wordsInner.parentElement.offsetWidth;
    // Keep the current word roughly centered
    let translateX = -left + containerW * 0.2;
    if (translateX > 0) translateX = 0;
    wordsInner.style.transform = `translateX(${translateX}px)`;
}

// ======================== CARET ========================
function updateCaret() {
    // Remove all caret classes
    document.querySelectorAll('.caret, .caret-after').forEach(el => {
        el.classList.remove('caret', 'caret-after');
    });

    const letters = letterEls[curWordIdx];
    if (!letters) return;

    if (curLetterIdx < letters.length) {
        letters[curLetterIdx].el.classList.add('caret');
    } else if (letters.length > 0) {
        // Caret is after last letter
        letters[letters.length - 1].el.classList.add('caret-after');
    }
}

// ======================== TIMER ========================
function startTimer() {
    timeLeft = MODE_TIME;
    timerText.textContent = timeLeft;
    const circumference = 138;
    timerCircle.style.strokeDashoffset = 0;

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        timerText.textContent = timeLeft;

        // Shrink the ring
        const offset = circumference * (1 - timeLeft / MODE_TIME);
        timerCircle.style.strokeDashoffset = offset;

        // Update live WPM
        const elapsed = MODE_TIME - timeLeft;
        if (elapsed > 0) {
            const liveWpm = Math.round((correctWords / elapsed) * 60);
            wpmDisplay.textContent = liveWpm;
        }

        if (timeLeft <= 0) {
            endGame();
        }

        // Update accuracy live
        if (totalKeystrokes > 0) {
            const acc = Math.max(0, Math.min(100, Math.round((correctKeystrokes / totalKeystrokes) * 100)));
            accDisplay.textContent = acc;
        }
    }, 1000);
}

// ======================== INPUT HANDLING ========================
inputEl.addEventListener('input', () => {
    if (!gameRunning) return;

    const val = inputEl.value;
    
    // Start timer on first keystroke
    if (!gameStarted && val.length > 0) {
        gameStarted = true;
        startTimer();
    }

    // Space = submit word
    if (val.endsWith(' ') && val.length > 0) {
        commitWord();
        return;
    }

    // Tracking Keystrokes for Accuracy
    if (val.length > typed.length) {
        // Character added
        totalKeystrokes++;
        const idx = val.length - 1;
        const letters = letterEls[curWordIdx];
        if (letters && idx < letters.length && val[idx] === letters[idx].char) {
            correctKeystrokes++;
        }
    } else if (val.length < typed.length) {
        // Character removed (Backspace)
        totalKeystrokes++;
    }

    typed = val;

    const letters = letterEls[curWordIdx];
    const word = words[curWordIdx];

    // Reset all letters to dim
    if (letters) {
        letters.forEach(l => l.el.className = 'letter');

        // Apply correct/wrong
        for (let i = 0; i < val.length; i++) {
            if (i < letters.length) {
                letters[i].el.className = 'letter ' + (val[i] === letters[i].char ? 'correct' : 'wrong');
            }
        }
    }

    // Wrong word border
    let isWrong = false;
    for (let i = 0; i < val.length && i < word.length; i++) {
        if (val[i] !== word[i]) { isWrong = true; break; }
    }
    inputEl.classList.toggle('wrong-word', isWrong);

    curLetterIdx = val.length;
    updateCaret();
});

inputEl.addEventListener('keydown', (e) => {
    // Prevent backspace from deleting past the start of a word? No - allow full edits
    if (e.key === 'Backspace' && inputEl.value === '') {
        // Optionally go back to previous word
        if (curWordIdx > 0) {
            curWordIdx--;
            typed = words[curWordIdx]; // restore typed word? Let's just reset
            inputEl.value = '';
            // Restore previous word letters to unfinished state
            letterEls[curWordIdx].forEach(l => l.el.className = 'letter');
            curLetterIdx = 0;
            updateCaret();
            scrollToCurrentWord();
        }
        e.preventDefault();
    }
});

function commitWord() {
    inputEl.value = '';
    inputEl.classList.remove('wrong-word');

    const word = words[curWordIdx];
    const userTyped = typed.trim();

    if (userTyped === word) {
        correctWords++;
        correctChars += word.length;
    }
    totalChars += word.length;

    // Mark word as done visually
    letterEls[curWordIdx].forEach((l, i) => {
        if (i < userTyped.length) {
            l.el.className = 'letter ' + (userTyped[i] === l.char ? 'correct' : 'wrong');
        }
    });

    curWordIdx++;
    typed = '';
    curLetterIdx = 0;

    // Progress
    progressFill.style.width = ((curWordIdx / words.length) * 100) + '%';

    if (curWordIdx >= words.length) {
        endGame();
        return;
    }

    updateCaret();
    scrollToCurrentWord();
}

// ======================== END GAME ========================
function endGame() {
    clearInterval(timerInterval);
    gameRunning = false;
    inputEl.blur();

    const elapsed = Math.max(1, MODE_TIME - timeLeft);
    const finalWpm = Math.round((correctWords / elapsed) * 60);
    const finalAcc = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;

    document.getElementById('result-wpm').textContent = finalWpm;
    document.getElementById('result-acc').textContent = finalAcc + '%';
    document.getElementById('result-words').textContent = correctWords;
    document.getElementById('result-chars').textContent = correctChars;

    showScreen('result-screen');
    
    // Check if score submission should start
    submitScore(finalWpm, finalAcc, correctWords);
}

// ======================== SCORE SUBMISSION ========================
async function submitScore(wpm, acc, wordsTyped) {
    const overlay = document.getElementById('sync-overlay');
    const statusMsg = document.getElementById('sync-status-msg');
    const syncText = document.getElementById('sync-text');
    const syncSpinner = document.getElementById('sync-spinner');
    const continueBtn = document.getElementById('sync-continue-btn');
    const rankBadge = document.getElementById('rank-badge');
    const syncStatus = document.getElementById('sync-status');

    if (!userId || wpm <= 0) {
        console.log("No Telegram session or score too low");
        return;
    }

    // Show overlay
    overlay.classList.add('visible');
    statusMsg.textContent = "";
    continueBtn.style.display = 'none';
    syncSpinner.style.display = 'block';

    try {
        const response = await fetch('/api/set_score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: userId,
                score: wpm,
                inline_message_id: inlineMessageId,
                chat_id: chatId,
                message_id: messageId
            })
        });

        const data = await response.json();
        
        if (response.ok && data.ok) {
            if (data.rank && data.rank > 0) {
                syncSpinner.style.display = 'none';
                statusMsg.textContent = "RANK #" + data.rank;
                continueBtn.style.display = 'block';
                rankBadge.style.display = 'flex';
                rankBadge.innerHTML = `
                    <div class="rank-label">GROUP STANDING</div>
                    <div class="rank-value">🏆 Rank <span>#${data.rank}</span></div>
                `;
            } else {
                hideSyncOverlay();
                rankBadge.style.display = 'flex';
                rankBadge.innerHTML = `<div class="rank-value"><span>${wpm} WPM</span> submitted!</div>`;
            }
        } else {
            hideSyncOverlay();
        }
    } catch (err) {
        hideSyncOverlay();
    }
}

function hideSyncOverlay() {
    document.getElementById('sync-overlay').classList.remove('visible');
}

// ======================== START / RESTART ========================
function initGame() {
    words = getRandomParagraph();
    curWordIdx = 0;
    curLetterIdx = 0;
    typed = '';
    
    correctWords = 0;
    totalChars = 0;
    correctChars = 0;
    totalKeystrokes = 0;
    correctKeystrokes = 0;
    
    gameStarted = false;
    gameRunning = true;
    timeLeft = MODE_TIME;

    wpmDisplay.textContent = '0';
    accDisplay.textContent = '100';
    progressFill.style.width = '0%';
    timerText.textContent = MODE_TIME;
    timerCircle.style.strokeDashoffset = 0;

    const rankBadge = document.getElementById('rank-badge');
    if (rankBadge) {
        rankBadge.style.display = 'none';
        rankBadge.innerHTML = '';
    }
    const syncStatus = document.getElementById('sync-status');
    if (syncStatus) syncStatus.innerHTML = '';

    buildWordUI();
    scrollToCurrentWord();
    
    inputEl.value = '';
    setTimeout(() => inputEl.focus(), 100);
}

document.getElementById('start-btn').addEventListener('click', () => {
    showScreen('game-screen');
    initGame();
});

document.getElementById('retry-btn').addEventListener('click', () => {
    showScreen('game-screen');
    initGame();
});

// Auto-focus input on game screen
document.addEventListener('keydown', () => {
    if (gameRunning) inputEl.focus();
});
</script>
