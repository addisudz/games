<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Flap</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bd00ff;
            --bg-top: #0a0a2a;
            --bg-bottom: #1a0b2e;
            --glass-bg: rgba(20, 15, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            color: var(--text);
            overflow: hidden;
            touch-action: none; /* Prevent scroll on touch */
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hud {
            position: absolute;
            top: 10%;
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 0 0 20px var(--primary);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .screen {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            pointer-events: auto;
            transform: scale(0.95);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .screen.active {
            display: flex;
            transform: scale(1);
            opacity: 1;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            line-height: 1.5;
        }

        button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-family: inherit;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.4);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.95);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        #syncing {
            font-size: 0.9rem;
            color: var(--primary);
            opacity: 0;
            transition: opacity 0.3s;
            height: 20px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="scoreHud" class="hud">0</div>

        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <h1>Neon Flap</h1>
            <p>Tap, click, or press Space<br>to boost your engines.</p>
            <button id="startBtn">Initiate</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="screen">
            <h1>System Failure</h1>
            <div class="stats">
                <div class="stat-box">
                    <span id="finalScore" class="stat-value">0</span>
                    <span class="stat-label">Score</span>
                </div>
                <!-- Optional best score local to session -->
            </div>
            <div id="syncing">Syncing to Telegram...</div>
            <button id="restartBtn">Reboot</button>
        </div>
    </div>

    <script>
        // --- Telegram Integration Setup ---
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const inlineMessageId = urlParams.get('inline_message_id');
        const chatId = urlParams.get('chat_id');
        const messageId = urlParams.get('message_id');
        
        async function submitScore(score) {
            const syncingText = document.getElementById('syncing');
            syncingText.style.opacity = '1';
            syncingText.innerText = "Syncing to Telegram...";
            syncingText.style.color = "var(--primary)";

            if (!userId) {
                syncingText.innerText = "Local play (No User ID)";
                return;
            }

            try {
                const response = await fetch('/api/set_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        score: score,
                        inline_message_id: inlineMessageId,
                        chat_id: chatId,
                        message_id: messageId
                    })
                });
                
                const data = await response.json();
                if (response.ok) {
                    syncingText.innerText = "Synced successfully!";
                    syncingText.style.color = "#00ff88";
                } else {
                    syncingText.innerText = "Sync failed.";
                    syncingText.style.color = "#ff3366";
                    console.error("Score submission error:", data);
                }
            } catch (err) {
                syncingText.innerText = "Network Error";
                syncingText.style.color = "#ff3366";
                console.error("Fetch error:", err);
            }
        }

        // --- Game Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let scale = 1;
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            // Base logical size for scaling
            scale = Math.min(width / 400, height / 800); 
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State Engine
        const STATE = { START: 0, PLAYING: 1, GAMEOVER: 2 };
        let currentState = STATE.START;

        // UI Elements
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreHud = document.getElementById('scoreHud');
        const finalScoreLabel = document.getElementById('finalScore');
        
        let frames = 0;
        let score = 0;

        // --- Entities ---
        const bg = {
            particles: [],
            init() {
                this.particles = [];
                for(let i=0; i<50; i++) {
                    this.particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: Math.random() * 2 + 1,
                        speedX: Math.random() * -2 - 1
                    });
                }
            },
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                this.particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
            },
            update() {
                if(currentState !== STATE.PLAYING) return;
                this.particles.forEach(p => {
                    p.x += p.speedX;
                    if(p.x < 0) {
                        p.x = width;
                        p.y = Math.random() * height;
                    }
                });
            }
        };

        const bird = {
            x: 0, y: 0,
            radius: 12,
            velocity: 0,
            gravity: 0.25,
            jumpStrength: -6,
            rotation: 0,
            init() {
                this.x = width * 0.3;
                this.y = height / 2;
                this.velocity = 0;
                this.rotation = 0;
            },
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Rotation based on velocity
                if (currentState === STATE.PLAYING) {
                    this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                }
                ctx.rotate(this.rotation);
                
                // Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f3ff';
                
                // Body
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * scale, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner core
                ctx.fillStyle = '#00f3ff';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.5 * scale, 0, Math.PI * 2);
                ctx.fill();

                // Thrust particles when jumping
                if (this.velocity < 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#bd00ff';
                    ctx.beginPath();
                    ctx.arc(Math.random()*-10*scale - 5*scale, Math.random()*10*scale - 5*scale, 2*scale, 0, Math.PI*2);
                    ctx.fill();
                }
                
                ctx.restore();
            },
            update() {
                if (currentState === STATE.START) {
                    // Hover effect
                    this.y = (height / 2) + Math.cos(frames / 15) * 10;
                } else {
                    this.velocity += this.gravity * (scale * 1500 / height); // Frame rate agnostic ish
                    this.y += this.velocity * (scale * 1500 / height);

                    // Floor collision
                    if (this.y + this.radius >= height) {
                        this.y = height - this.radius;
                        if(currentState === STATE.PLAYING) die();
                    }
                    // Ceiling collision
                    if (this.y - this.radius <= 0) {
                        this.y = this.radius;
                        this.velocity = 0;
                    }
                }
            },
            flap() {
                this.velocity = this.jumpStrength;
            }
        };

        const pipes = {
            items: [],
            width: 60,
            gap: 160,
            dx: 3.5,
            init() {
                this.items = [];
                // Base gap logic
                this.gap = 180 * scale; 
                this.width = 60 * scale;
                this.dx = 4.0 * scale;
            },
            draw() {
                this.items.forEach(p => {
                    // Glow effect
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#bd00ff';
                    
                    // Draw top pipe
                    let grd1 = ctx.createLinearGradient(p.x, 0, p.x + this.width, 0);
                    grd1.addColorStop(0, "rgba(189, 0, 255, 0.2)");
                    grd1.addColorStop(0.5, "rgba(189, 0, 255, 0.8)");
                    grd1.addColorStop(1, "rgba(189, 0, 255, 0.2)");
                    ctx.fillStyle = grd1;
                    
                    ctx.strokeStyle = '#bd00ff';
                    ctx.lineWidth = 2;
                    
                    // Top pipe borders
                    ctx.fillRect(p.x, 0, this.width, p.topHeight);
                    ctx.strokeRect(p.x, 0, this.width, p.topHeight);
                    
                    // Draw bottom pipe
                    ctx.fillRect(p.x, p.topHeight + this.gap, this.width, height);
                    ctx.strokeRect(p.x, p.topHeight + this.gap, this.width, height);
                    
                    // Reset shadow 
                    ctx.shadowBlur = 0;
                });
            },
            update() {
                if (currentState !== STATE.PLAYING) return;
                
                // Spawn new pipe
                if (frames % Math.max(70, Math.floor(100 / scale)) === 0) {
                    let minHeight = 50 * scale;
                    let maxHeight = height - this.gap - minHeight;
                    let topH = Math.max(minHeight, Math.random() * maxHeight);
                    this.items.push({
                        x: width,
                        topHeight: topH,
                        passed: false
                    });
                }
                
                for(let i=0; i<this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= this.dx;

                    // Collision detection
                    // Bird bounds
                    let bx = bird.x;
                    let by = bird.y;
                    let br = bird.radius * scale - 2; // small grace area
                    
                    if (bx + br > p.x && bx - br < p.x + this.width) {
                        // Inside pipe horizontal slice
                        if (by - br < p.topHeight || by + br > p.topHeight + this.gap) {
                            die();
                        }
                    }

                    // Score point
                    if (p.x + this.width < bird.x && !p.passed) {
                        p.passed = true;
                        score++;
                        scoreHud.innerText = score;
                        // Minor visual pop effect on score body could be added here
                        scoreHud.style.transform = "scale(1.3)";
                        setTimeout(() => scoreHud.style.transform = "scale(1)", 150);
                    }
                    
                    // Remove off-screen pipes
                    if (p.x + this.width < 0) {
                        this.items.shift();
                        i--;
                    }
                }
            }
        };

        // --- Core Functions ---
        function setUI() {
            startScreen.classList.remove('active');
            gameOverScreen.classList.remove('active');
            scoreHud.style.opacity = '0';
            
            if (currentState === STATE.START) {
                startScreen.classList.add('active');
            } else if (currentState === STATE.PLAYING) {
                scoreHud.style.opacity = '1';
                scoreHud.innerText = score;
            } else if (currentState === STATE.GAMEOVER) {
                gameOverScreen.classList.add('active');
                finalScoreLabel.innerText = score;
                document.getElementById('syncing').style.opacity = '0'; // reset
                submitScore(score);
            }
        }

        function play() {
            score = 0;
            bird.init();
            pipes.init();
            currentState = STATE.PLAYING;
            scoreHud.style.transform = "scale(1)";
            setUI();
        }

        function die() {
            currentState = STATE.GAMEOVER;
            setUI();
        }

        // --- Inputs ---
        function action() {
            if (currentState === STATE.START) {
                play();
                bird.flap();
            } else if (currentState === STATE.PLAYING) {
                bird.flap();
            } else if (currentState === STATE.GAMEOVER) {
                // Ignore input to prevent instant restart. Use button instead.
            }
        }

        // Mouse & Touch bindings over canvas (excluding UI buttons)
        canvas.addEventListener('mousedown', action);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, {passive: false});
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                action();
            }
        });

        // UI Buttons
        document.getElementById('startBtn').addEventListener('click', () => {
            if(currentState === STATE.START) { play(); bird.flap(); }
        });
        document.getElementById('restartBtn').addEventListener('click', () => {
            if(currentState === STATE.GAMEOVER) play();
        });


        // --- Render Loop ---
        function loop() {
            // Clear gradient background (handled by CSS, so we just clear rect with transparency)
            ctx.clearRect(0, 0, width, height);

            bg.draw();
            bg.update();
            
            pipes.draw();
            pipes.update();
            
            bird.draw();
            bird.update();
            
            frames++;
            requestAnimationFrame(loop);
        }

        // Initialize and Start
        bg.init();
        bird.init();
        pipes.init();
        setUI();
        loop();

    </script>
</body>
</html>
