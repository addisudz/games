<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            overflow: hidden;
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            font-family: monospace;
        }

        #scoreHud {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            font-size: 4rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 0 #000, 0 -4px 0 #000, 4px 0 0 #000, -4px 0 0 #000, 0 8px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #syncing {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        #rankDisplay {
            position: absolute;
            bottom: 25%;
            width: 100%;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 3px 0 #000, 0 -3px 0 #000, 3px 0 0 #000, -3px 0 0 #000;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* ===== SYNC OVERLAY ===== */
        .sync-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(8px);
        }
        .sync-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }
        .sync-content {
            text-align: center;
            color: white;
            animation: syncPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes syncPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .sync-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top: 6px solid #4CAF50; /* Pipe Green */
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        .sync-text {
            display: none;
        }
        .sync-status {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 2px 0 #000, 0 -2px 0 #000, 2px 0 0 #000, -2px 0 0 #000;
        }
        .sync-btn {
            margin-top: 24px;
            padding: 12px 30px;
            background: #4CAF50;
            border: 4px solid #fff;
            border-radius: 0; /* Flappy style */
            color: white;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div id="loading">Loading Assets...</div>
    <div id="syncing" style="display:none;"></div>
    <div id="scoreHud" style="opacity: 0;">0</div>
    <div id="rankDisplay"></div>
    <canvas id="gameCanvas" style="display: none;"></canvas>

    <!-- SYNC OVERLAY -->
    <div id="sync-overlay" class="sync-overlay">
        <div class="sync-content">
            <div id="sync-spinner" class="sync-spinner"></div>
            <div id="sync-status-msg" class="sync-status"></div>
            <button id="sync-continue-btn" class="sync-btn">Continue</button>
        </div>
    </div>

    <script>
        const vStr = "?v=4";
        const assets = {
            loaded: 0,
            total: 13, // 8 images + 5 sounds
            bg: new Image(),
            base: new Image(),
            pipe: new Image(),
            bird: [new Image(), new Image(), new Image()],
            message: new Image(),
            gameover: new Image(),
            // Sounds
            wing: new Audio('/flappy-bird-assets/audio/wing.wav' + vStr),
            point: new Audio('/flappy-bird-assets/audio/point.wav' + vStr),
            hit: new Audio('/flappy-bird-assets/audio/hit.wav' + vStr),
            die: new Audio('/flappy-bird-assets/audio/die.wav' + vStr),
            swoosh: new Audio('/flappy-bird-assets/audio/swoosh.wav' + vStr)
        };

        function onAssetLoad() {
            assets.loaded++;
            if (assets.loaded === assets.total) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('gameCanvas').style.display = 'block';
                document.getElementById('scoreHud').style.opacity = '0';
                resize();
                bg.init();
                bird.init();
                pipes.init();
                currentState = STATE.START;
                requestAnimationFrame(loop);
            }
        }

        // Image listeners
        assets.bg.onload = onAssetLoad;
        assets.base.onload = onAssetLoad;
        assets.pipe.onload = onAssetLoad;
        assets.bird[0].onload = onAssetLoad;
        assets.bird[1].onload = onAssetLoad;
        assets.bird[2].onload = onAssetLoad;
        assets.message.onload = onAssetLoad;
        assets.gameover.onload = onAssetLoad;

        // Audio listeners
        assets.wing.oncanplaythrough = onAssetLoad;
        assets.point.oncanplaythrough = onAssetLoad;
        assets.hit.oncanplaythrough = onAssetLoad;
        assets.die.oncanplaythrough = onAssetLoad;
        assets.swoosh.oncanplaythrough = onAssetLoad;

        assets.bg.src = '/flappy-bird-assets/sprites/background-day.png' + vStr;
        assets.base.src = '/flappy-bird-assets/sprites/base.png' + vStr;
        assets.pipe.src = '/flappy-bird-assets/sprites/pipe-green.png' + vStr;
        assets.bird[0].src = '/flappy-bird-assets/sprites/yellowbird-downflap.png' + vStr;
        assets.bird[1].src = '/flappy-bird-assets/sprites/yellowbird-midflap.png' + vStr;
        assets.bird[2].src = '/flappy-bird-assets/sprites/yellowbird-upflap.png' + vStr;
        assets.message.src = '/flappy-bird-assets/sprites/message.png' + vStr;
        assets.gameover.src = '/flappy-bird-assets/sprites/gameover.png' + vStr;

        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            const inlineMessageId = urlParams.get('inline_message_id');
            const chatId = urlParams.get('chat_id');
            const messageId = urlParams.get('message_id');
            const vToken = urlParams.get('v_token');

            async function computeSignature(score, token) {
                const encoder = new TextEncoder();
                const keyData = encoder.encode(token);
                // Obfuscated salt - must match backend
                const s = "X7h9" + "_" + "P2q" + "_" + "K4v";
                const scoreData = encoder.encode(s + ":" + score.toString());
                const key = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
                const signature = await crypto.subtle.sign('HMAC', key, scoreData);
                return Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function submitScore(score) {
                const overlay = document.getElementById('sync-overlay');
                const statusMsg = document.getElementById('sync-status-msg');
                const syncSpinner = document.getElementById('sync-spinner');
                const continueBtn = document.getElementById('sync-continue-btn');
                const rankDisplay = document.getElementById('rankDisplay');

                if (!userId || score <= 0 || !vToken) return;

                overlay.classList.add('visible');
                statusMsg.textContent = "";
                continueBtn.style.display = 'none';
                syncSpinner.style.display = 'block';

                try {
                    const scoreSig = await computeSignature(score, vToken);
                    const response = await fetch('/api/set_score', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: userId, score: score,
                            inline_message_id: inlineMessageId,
                            chat_id: chatId, message_id: messageId,
                            v_token: vToken, score_sig: scoreSig
                        })
                    });

                    const data = await response.json();
                    if (response.ok && data.ok) {
                        if (data.rank && data.rank > 0) {
                            syncSpinner.style.display = 'none';
                            statusMsg.textContent = "RANK #" + data.rank;
                            continueBtn.style.display = 'block';
                            rankDisplay.innerText = "Rank #" + data.rank + " in the Group";
                            rankDisplay.style.opacity = '1';
                        } else {
                            hideSyncOverlay();
                            rankDisplay.innerText = "High Score Synced! 🚀";
                            rankDisplay.style.opacity = '1';
                        }
                    } else { hideSyncOverlay(); }
                } catch (err) { hideSyncOverlay(); }
            }

            function hideSyncOverlay() {
                document.getElementById('sync-overlay').classList.remove('visible');
            }

            document.getElementById('sync-continue-btn').addEventListener('click', hideSyncOverlay);

            // Export to window safely
            window._submitScore = submitScore;
        })();

        // Global proxy for game loop
        function submitScore(score) {
            if (window._submitScore) window._submitScore(score);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreHud = document.getElementById('scoreHud');
        const rankDisplay = document.getElementById('rankDisplay');

        let width, height;
        let scale = 1;
        let bScale = 1;
        let baseHeight = 112;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            bScale = height / 512;
            scale = Math.min(width / 300, height / 600);
            baseHeight = 112 * bScale;
        }
        window.addEventListener('resize', resize);

        const STATE = { START: 0, PLAYING: 1, GAMEOVER: 2 };
        let currentState = STATE.START;
        let frames = 0;
        let score = 0;

        const bg = {
            x: 0,
            init() { this.x = 0; },
            draw() {
                let scaledW = 288 * bScale;
                let count = Math.ceil(width / scaledW) + 1;
                for (let i = 0; i < count; i++) {
                    ctx.drawImage(assets.bg, this.x + i * scaledW, 0, scaledW + 1, height);
                }
            },
            update() {
                if (currentState !== STATE.PLAYING) return;
                let scaledW = 288 * bScale;
                this.x -= 1 * scale;
                if (this.x <= -scaledW) {
                    this.x += scaledW;
                }
            }
        };

        const base = {
            x: 0,
            init() { this.x = 0; },
            draw() {
                let scaledW = 336 * bScale;
                let scaledH = baseHeight;
                let count = Math.ceil(width / scaledW) + 1;
                for (let i = 0; i < count; i++) {
                    ctx.drawImage(assets.base, this.x + i * scaledW, height - scaledH, scaledW + 1, scaledH);
                }
            },
            update() {
                if (currentState !== STATE.PLAYING) return;
                let scaledW = 336 * bScale;
                this.x -= pipes.dx;
                if (this.x <= -scaledW) {
                    this.x += scaledW;
                }
            }
        };

        const bird = {
            x: 0, y: 0,
            radius: 14,
            velocity: 0,
            gravity: 0.25,
            jumpStrength: -6,
            rotation: 0,
            init() {
                this.x = width * 0.3;
                this.y = height / 2;
                this.velocity = 0;
                this.rotation = 0;
            },
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (currentState === STATE.PLAYING || currentState === STATE.GAMEOVER) {
                    this.rotation = Math.min(Math.PI / 2, Math.max(-Math.PI / 6, (this.velocity * 0.1)));
                } else {
                    this.rotation = 0;
                }
                ctx.rotate(this.rotation);

                let bImg = assets.bird[1];
                if (currentState === STATE.PLAYING) {
                    if (this.velocity < 0) {
                        bImg = assets.bird[Math.floor(frames / 4) % 3];
                    } else {
                        bImg = assets.bird[1];
                    }
                } else if (currentState === STATE.GAMEOVER) {
                    bImg = assets.bird[1];
                } else {
                    bImg = assets.bird[Math.floor(frames / 8) % 3];
                }

                let bw = 34 * scale * 1.5;
                let bh = 24 * scale * 1.5;
                ctx.drawImage(bImg, -bw / 2, -bh / 2, bw, bh);
                ctx.restore();
            },
            update() {
                if (currentState === STATE.START) {
                    this.y = (height / 2) + Math.cos(frames / 15) * 10;
                } else {
                    this.velocity += this.gravity * (scale * 1400 / height);
                    this.y += this.velocity * (scale * 1400 / height);

                    if (this.y + this.radius * scale >= height - baseHeight) {
                        this.y = height - baseHeight - this.radius * scale;
                        if (currentState === STATE.PLAYING) die();
                    }
                    if (this.y - this.radius * scale <= 0) {
                        this.y = this.radius * scale;
                        this.velocity = 0;
                    }
                }
            },
            flap() {
                this.velocity = this.jumpStrength;
                // Play wing sound
                assets.wing.currentTime = 0;
                assets.wing.play().catch(() => {});
            }
        };

        const pipes = {
            items: [],
            width: 60,
            gap: 160,
            dx: 3.5,
            init() {
                this.items = [];
                this.gap = 180 * scale;
                this.width = 52 * scale * 1.3;
                this.dx = 3.5 * scale;
            },
            draw() {
                this.items.forEach(p => {
                    let pw = this.width;
                    let ph = 320 * scale * 1.5;
                    ctx.save();
                    ctx.translate(p.x, p.topHeight);
                    ctx.scale(1, -1);
                    ctx.drawImage(assets.pipe, 0, 0, pw, ph);
                    ctx.restore();
                    ctx.drawImage(assets.pipe, p.x, p.topHeight + this.gap, pw, ph);
                });
            },
            update() {
                if (currentState !== STATE.PLAYING) return;
                if (frames % Math.max(60, Math.floor(90 / scale)) === 0) {
                    let minHeight = 50 * scale;
                    let maxHeight = height - baseHeight - this.gap - minHeight;
                    let topH = Math.max(minHeight, minHeight + Math.random() * (maxHeight - minHeight));
                    this.items.push({
                        x: width,
                        topHeight: topH,
                        passed: false
                    });
                }

                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= this.dx;
                    let bx = bird.x;
                    let by = bird.y;
                    let br = bird.radius * scale - 4;

                    if (bx + br > p.x && bx - br < p.x + this.width) {
                        if (by - br < p.topHeight || by + br > p.topHeight + this.gap) {
                            die();
                        }
                    }

                    if (p.x + this.width < bird.x && !p.passed) {
                        p.passed = true;
                        score++;
                        assets.point.play().catch(() => {});
                        scoreHud.innerText = score;
                        scoreHud.style.transform = "scale(1.3)";
                        setTimeout(() => scoreHud.style.transform = "scale(1)", 150);
                    }

                    if (p.x + this.width < 0) {
                        this.items.shift();
                        i--;
                    }
                }
            }
        };

        function drawUI() {
            if (currentState === STATE.START) {
                let msgW = 184 * scale * 1.2;
                let msgH = 267 * scale * 1.2;
                ctx.drawImage(assets.message, (width - msgW) / 2, (height - msgH) / 2, msgW, msgH);
            } else if (currentState === STATE.GAMEOVER) {
                let goW = 192 * scale * 1.5;
                let goH = 42 * scale * 1.5;
                ctx.drawImage(assets.gameover, (width - goW) / 2, height * 0.25, goW, goH);
            }
        }

        function play() {
            score = 0;
            assets.swoosh.play().catch(() => {});
            bird.init();
            pipes.init();
            currentState = STATE.PLAYING;
            scoreHud.innerText = score;
            scoreHud.style.opacity = '1';
            rankDisplay.style.opacity = '0';
            document.getElementById('syncing').style.opacity = '0';
            bird.flap();
        }

        function die() {
            assets.hit.play().catch(() => {});
            setTimeout(() => {
                assets.die.play().catch(() => {});
            }, 100);
            currentState = STATE.GAMEOVER;
            submitScore(score);
        }

        let lastJumpTime = 0;
        function action() {
            if (Date.now() - lastJumpTime < 50) return; // Prevent double trigger from simultaneous touch+mouse
            lastJumpTime = Date.now();
            
            if (currentState === STATE.START) {
                play();
            } else if (currentState === STATE.PLAYING) {
                bird.flap();
            } else if (currentState === STATE.GAMEOVER) {
                // Ignore fast taps
            }
        }

        let deathTime = 0;
        function restartAction() {
            if (currentState === STATE.GAMEOVER) {
                if (Date.now() - deathTime > 500) {
                    currentState = STATE.START;
                    scoreHud.style.opacity = '0';
                    rankDisplay.style.opacity = '0';
                    document.getElementById('syncing').style.opacity = '0'; 
                }
            } else {
                action();
            }
        }

        const originalDie = die;
        die = function () {
            originalDie();
            deathTime = Date.now();
        }

        canvas.addEventListener('mousedown', restartAction);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); restartAction(); }, { passive: false });
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                restartAction();
            }
        });

        const fixedDelta = 1000 / 60; // strictly 60 ticks per second
        let accumulator = 0;
        let lastTime = 0;

        function loop(timestamp) {
            if (!timestamp) {
                requestAnimationFrame(loop);
                return;
            }
            if (!lastTime) lastTime = timestamp;
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            
            if (dt > 100) dt = fixedDelta; 
            accumulator += dt;

            let updated = false;
            while(accumulator >= fixedDelta) {
                bg.update();
                pipes.update();
                base.update();
                bird.update();
                frames++;
                accumulator -= fixedDelta;
                updated = true;
            }

            // Always draw if in START or GAMEOVER to show the message.png or gameover.png
            ctx.clearRect(0, 0, width, height);
            bg.draw();
            pipes.draw();
            base.draw();
            bird.draw();
            drawUI();
            
            requestAnimationFrame(loop);
        }

    </script>
</body>

</html>
